<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ludo Game</title>

<style>
body {
    margin: 0;
    font-family: Arial Black, sans-serif;
    background: radial-gradient(circle, #3b2e83, #1a1440);
}

.page {
    display: none;
    height: 100vh;
}

.active {
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

h1 {
    color: white;
    text-align: center;
}

h1 span {
    color: gold;
}

.grid {
    display: grid;
    grid-template-columns: repeat(2, 200px);
    gap: 20px;
    margin-top: 30px;
}

.card {
    background: linear-gradient(#1f4fbf, #0c2a73);
    border: 4px solid gold;
    border-radius: 20px;
    padding: 20px;
    text-align: center;
    color: white;
    cursor: pointer;
    box-shadow: 0 0 15px gold;
    transition: 0.2s;
}

.card:hover {
    transform: scale(1.05);
}

.label {
    background: gold;
    color: #0c2a73;
    padding: 10px;
    border-radius: 10px;
    margin-top: 10px;
}

.board {
    width: 90vmin;
    height: 90vmin;
    display: grid;
    grid-template-columns: repeat(15, 1fr);
    grid-template-rows: repeat(15, 1fr);
    background: #ddd;
}

.home {
    display: flex;
    justify-content: center;
    align-items: center;
}

.red { background: #e53935; }
.green { background: #43a047; }
.yellow { background: #fdd835; }
.blue { background: #1e88e5; }

.home-box {
    width: 70%;
    height: 70%;
    background: white;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    padding: 10px;
}

.token {
    border-radius: 50%;
}

.token.red { background: #e53935; }
.token.green { background: #43a047; }
.token.yellow { background: #fdd835; }
.token.blue { background: #1e88e5; }

.back {
    position: absolute;
    top: 20px;
    left: 20px;
    background: gold;
    padding: 10px 15px;
    border-radius: 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<div id="page1" class="page active">
    <h1><span>#1</span> GAME ON<br>GOOGLE PLAY<br>& APP STORE</h1>

    <div class="grid">
        <div class="card" onclick="openGame()">
            🌍
            <div class="label">PLAY ONLINE</div>
        </div>

        <div class="card" onclick="openGame()">
            ❤️❤️
            <div class="label">PLAY WITH FRIENDS</div>
        </div>

        <div class="card" onclick="openGame()">
            VS
            <div class="label">COMPUTER</div>
        </div>

        <div class="card" onclick="openGame()">
            👥
            <div class="label">PASS N PLAY</div>
        </div>
    </div>
</div>

<div id="page2" class="page">

    <div class="back" onclick="goBack()">⬅ Back</div>

    <div class="board">

    
        <div class="home red" style="grid-column:1/7; grid-row:1/7;">
            <div class="home-box">
                <div class="token red"></div>
                <div class="token red"></div>
                <div class="token red"></div>
                <div class="token red"></div>
            </div>
        </div>

    
        <div class="home green" style="grid-column:10/16; grid-row:1/7;">
            <div class="home-box">
                <div class="token green"></div>
                <div class="token green"></div>
                <div class="token green"></div>
                <div class="token green"></div>
            </div>
        </div>

        <div class="home blue" style="grid-column:1/7; grid-row:10/16;">
            <div class="home-box">
                <div class="token blue"></div>
                <div class="token blue"></div>
                <div class="token blue"></div>
                <div class="token blue"></div>
            </div>
        </div>

        <div class="home yellow" style="grid-column:10/16; grid-row:10/16;">
            <div class="home-box">
                <div class="token yellow"></div>
                <div class="token yellow"></div>
                <div class="token yellow"></div>
                <div class="token yellow"></div>
            </div>
        </div>

    </div>
</div>

<script>
function openGame() {
    document.getElementById("page1").classList.remove("active");
    document.getElementById("page2").classList.add("active");
}

function goBack() {
    document.getElementById("page2").classList.remove("active");
    document.getElementById("page1").classList.add("active");
}
</script>

</body>
</html>
